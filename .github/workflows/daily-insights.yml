name: Daily Report Insights

on:
  workflow_run:
    # 크롤러(Daily Report Summary)가 끝나면 곧바로 실행 — 스케줄 지연이 커도
    # 항상 "크롤링 → 인사이트" 순서가 보장된다.
    workflows: ["Daily Report Summary"]
    types: [completed]
  schedule:
    # 백업 스케줄. UTC 01:37 = 한국시간(KST) 오전 10:37
    # 정각(01:00 UTC)은 예약 작업이 몰려 지연·누락되기 쉬워 37분으로 비껴둠
    - cron: "37 1 * * *"
  workflow_dispatch: {} # 깃허브에서 수동 실행 버튼 제공
  push:
    branches: [main]
    # 소스/코드 변경 시에만 재배포. 봇이 만드는 reports/ 커밋은 제외해 무한루프 방지.
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/daily-insights.yml"
      - "briefs/**" # 시황 브리핑 붙여넣고 푸시하면 자동 배포
      - "reports/**" # 로컬 스크리너가 리포트를 push 하면 사이트 재배포 (봇 커밋은 [skip ci]로 제외)
      - "blog/**" # 블로그(투자전략) 본문 갱신 시 재배포

# 생성된 HTML 커밋(contents) + GitHub Pages 배포(pages, id-token)
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-insights
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build insights (드라이브 xlsx → HTML)
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
          PYTHONUTF8: "1"
          MPLBACKEND: Agg
        run: python sync_report_summary.py

      - name: Commit generated reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "insights: $(date -u +%Y-%m-%d) 자동 생성 [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports # index.html 이 랜딩 페이지

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
